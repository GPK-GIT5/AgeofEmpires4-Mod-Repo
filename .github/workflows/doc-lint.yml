name: Documentation Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq (YAML parser)
        shell: pwsh
        continue-on-error: true
        run: |
          $targetVersion = "4.40.5"
          $needsInstall = $false

          # Attempt 1: winget (preferred)
          Write-Information "Attempting yq install via winget..." -InformationAction Continue
          try {
            winget install --id MikeFarah.yq -e --accept-source-agreements --accept-package-agreements --silent
            Start-Sleep -Seconds 2  # Allow PATH refresh
          } catch {
            Write-Information "[WARN] winget install failed: $_" -InformationAction Continue
          }

          # Check version
          try {
            $installedVersion = (yq --version 2>&1) -replace '.*yq.*version v?([0-9.]+).*', '$1'
            Write-Information "Detected yq version: $installedVersion" -InformationAction Continue

            if ($installedVersion -ne $targetVersion) {
              Write-Information "[WARN] Version mismatch (expected: $targetVersion, got: $installedVersion)" -InformationAction Continue
              $needsInstall = $true
            } else {
              Write-Information "[SUCCESS] yq v$installedVersion is correct version" -InformationAction Continue
            }
          } catch {
            Write-Information "[WARN] yq not found in PATH" -InformationAction Continue
            $needsInstall = $true
          }

          # Attempt 2: Direct binary download (if needed)
          if ($needsInstall) {
            Write-Information "Installing yq v$targetVersion via direct download..." -InformationAction Continue
            try {
              $yqUrl = "https://github.com/mikefarah/yq/releases/download/v$targetVersion/yq_windows_amd64.exe"
              $yqPath = "$env:RUNNER_TEMP\yq.exe"

              Invoke-WebRequest -Uri $yqUrl -OutFile $yqPath -ErrorAction Stop

              # Add to PATH for this job
              $env:PATH = "$env:RUNNER_TEMP;$env:PATH"
              echo "$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

              Write-Information "[SUCCESS] yq v$targetVersion downloaded and added to PATH" -InformationAction Continue
            } catch {
              Write-Information "[WARN] Direct download failed: $_" -InformationAction Continue
              Write-Information "[WARN] YAML validation will be skipped in lint script" -InformationAction Continue
              exit 0
            }
          }

          # Final version check
          try {
            $finalVersion = yq --version
            Write-Information "=== Final yq version: $finalVersion ===" -InformationAction Continue
          } catch {
            Write-Information "[WARN] yq not available - YAML validation will be skipped" -InformationAction Continue
          }

      - name: Run documentation lint
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .github/copilot/scripts/doc_lint.ps1

      - name: Upload baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-lint-baseline
          path: .github/copilot/scripts/doc_lint_baseline_2026-03.txt
          retention-days: 30